<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog • Obsidian Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #111111;
            --box: #ffffff;
            --border: #e0e0e0;
            --accent: #0066cc;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .dark {
            --bg: #0f0f0f;
            --text: #eeeeee;
            --box: #1a1a1a;
            --border: #333333;
            --accent: #4da3ff;
            --card-shadow: 0 4px 25px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* HEADER */
        .header {
            background: var(--box);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 10px 0;
        }
        .topbar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin: 0;
            cursor: pointer;
        }
        #current-date { font-size: 12px; opacity: 0.6; }

        .controls { display: flex; gap: 10px; align-items: center; }
        .btn {
            cursor: pointer;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
        }
        .sync-btn { background: var(--accent); color: white; }
        .theme-btn { background: transparent; border: 1px solid var(--border); color: var(--text); }

        /* MAIN LAYOUT - WIDER FOR ARTICLES */
        .container {
            max-width: 1200px; /* Expanded from 1100px */
            margin: 40px auto;
            padding: 0 20px;
        }

        /* HOME GRID */
        #home {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        .article-card {
            background: var(--box);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: transform 0.3s ease;
            border: 1px solid var(--border);
        }
        .article-card:hover { transform: translateY(-5px); }
        .article-card img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .card-body { padding: 20px; }
        .card-body h2 { font-family: 'Playfair Display', serif; margin: 0 0 10px; font-size: 1.3rem; }

        /* EXPANDED ARTICLE VIEW */
        #article-view {
            display: none;
            max-width: 1000px; /* EXPANDED to fill the "red boxes" space */
            margin: 40px auto;
            background: var(--box);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
        }
        #article-content img {
            width: 100%; /* Make images fill the new wider container */
            max-height: 500px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        #article-content h2 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 10px; }
        .md-body { font-size: 1.1rem; }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* OBSIDIAN CALLOUTS */
        .callout {
            padding: 16px;
            margin: 20px 0;
            border-left: 4px solid var(--accent);
            background: rgba(120, 120, 120, 0.05);
            border-radius: 6px;
        }

        @media (max-width: 768px) {
            #article-view { padding: 20px; border-radius: 0; margin-top: 0; }
            #article-content h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="topbar">
        <div id="current-date"></div>
        <h1 onclick="navigateToHome()">My Blog</h1>
        <div class="controls">
            <button id="sync-btn" class="btn sync-btn" onclick="refreshFromGitHub()">🔄 Refresh</button>
            <button id="theme-toggle" class="btn theme-btn" onclick="toggleDark()"></button>
        </div>
    </div>
</div>

<div id="home" class="container"></div>

<div id="article-view" class="container">
    <div id="article-content"></div>
    <span class="back-link" onclick="navigateToHome()">← Back to Home</span>
</div>

<script>
const GITHUB_CONFIG = {
    owner: "GeorgeHasGames",
    repo: "gamesgeorge",
    branch: "main",
    postsFolder: "post"
};

let articles = [];

// Navigation logic for URLs
window.onhashchange = handleRouting;

function handleRouting() {
    const hash = window.location.hash.replace('#', '');
    if (hash && articles.length > 0) {
        const found = articles.find(a => slugify(a.id) === hash);
        if (found) {
            openArticle(found.id, false);
            return;
        }
    }
    goHomeUI();
}

function slugify(text) {
    return text.toString().toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]+/g, '').replace(/--+/g, '-').replace('.md','');
}

function parseFrontmatter(md) {
    const match = md.match(/^---\s*([\s\S]*?)\s*---\s*([\s\S]*)$/);
    if (!match) return { metadata: {}, content: md };
    const meta = {};
    match[1].split('\n').forEach(line => {
        const [key, ...val] = line.split(':');
        if (key) meta[key.trim()] = val.join(':').trim();
    });
    return { metadata: meta, content: match[2].trim() };
}

async function refreshFromGitHub() {
    const btn = document.getElementById('sync-btn');
    btn.innerText = "⏳ Loading...";
    try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.postsFolder}`);
        const files = await res.json();
        const mdFiles = files.filter(f => f.name.endsWith('.md'));

        articles = await Promise.all(mdFiles.map(async file => {
            const raw = await (await fetch(file.download_url)).text();
            const { metadata, content } = parseFrontmatter(raw);
            return {
                id: file.name,
                title: metadata.title || file.name.replace('.md', ''),
                date: metadata.date || 'Recent',
                image: metadata.image || null,
                content: content,
                preview: content.slice(0, 120) + '...'
            };
        }));
        
        localStorage.setItem('blog_cache', JSON.stringify(articles));
        renderHome();
        handleRouting(); // Check URL after loading
    } catch (e) { console.error(e); }
    btn.innerText = "🔄 Refresh";
}

function renderHome() {
    const home = document.getElementById('home');
    home.innerHTML = articles.map(a => `
        <div class="article-card" onclick="navigateToArticle('${slugify(a.id)}')">
            ${a.image ? `<img src="${a.image}">` : ''}
            <div class="card-body">
                <h2>${a.title}</h2>
                <div class="meta">${a.date}</div>
                <p>${a.preview}</p>
            </div>
        </div>
    `).join('');
}

// URL triggers
function navigateToArticle(slug) { window.location.hash = slug; }
function navigateToHome() { window.location.hash = ''; }

function openArticle(id, updateHash = true) {
    const a = articles.find(p => p.id === id);
    if (!a) return;
    
    const view = document.getElementById('article-content');
    view.innerHTML = `
        ${a.image ? `<img src="${a.image}">` : ''}
        <h2>${a.title}</h2>
        <div class="meta">${a.date}</div>
        <hr style="opacity:0.1; margin: 20px 0;">
        <div class="md-body">${marked.parse(a.content)}</div>
    `;
    
    document.getElementById('home').style.display = 'none';
    document.getElementById('article-view').style.display = 'block';
    window.scrollTo(0,0);
}

function goHomeUI() {
    document.getElementById('home').style.display = 'grid';
    document.getElementById('article-view').style.display = 'none';
}

function toggleDark() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    document.getElementById('theme-toggle').innerText = isDark ? '☀️ Light' : '🌙 Dark';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

window.onload = () => {
    const saved = JSON.parse(localStorage.getItem('blog_cache'));
    if (saved) { 
        articles = saved; 
        renderHome(); 
        handleRouting();
    } else {
        refreshFromGitHub();
    }
    
    if (localStorage.getItem('theme') === 'dark') toggleDark();
    else document.getElementById('theme-toggle').innerText = '🌙 Dark';
    document.getElementById('current-date').innerText = new Date().toLocaleDateString();
};
</script>
</body>
</html>
